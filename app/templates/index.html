<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base-path" content="{{ base_path }}">
  <title>Recipe Labels</title>
  <link rel="stylesheet" href="{{ base_path }}/static/style.css">
</head>
<body>
  <header>
    <h1>Recipe Labels</h1>
    <span id="health-status" class="status-dot" title="Checking..."></span>
  </header>

  <main>
    <!-- Step 1: Input -->
    <section id="input-section" class="card">
      <h2>Ingredients</h2>
      <textarea id="ingredients-input" rows="5"
        placeholder="Type or dictate ingredients, e.g.:&#10;800g whole milk, 2 tbsp butter, 1 cup water"></textarea>
      <div class="button-row">
        <button id="mic-btn" class="icon-btn" title="Voice dictation">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>
        <button id="parse-btn" class="primary-btn">Parse Ingredients</button>
      </div>
      <div id="parse-error" class="error hidden"></div>
    </section>

    <!-- Step 2: Confirmation -->
    <section id="confirm-section" class="card hidden">
      <h2>Confirm Recipe</h2>

      <div class="form-row">
        <label for="recipe-name">Recipe Name</label>
        <input type="text" id="recipe-name" placeholder="Auto-generated">
      </div>
      <div class="form-row">
        <label for="recipe-suffix">Suffix</label>
        <input type="text" id="recipe-suffix" readonly maxlength="4" class="short-input">
      </div>

      <h3>Per-Ingredient Breakdown</h3>
      <div class="table-wrap">
        <table id="ingredient-table">
          <thead>
            <tr><th>Ingredient</th><th>Grams</th><th>Cal</th><th>Fat</th><th>Protein</th><th>Carb</th></tr>
          </thead>
          <tbody></tbody>
          <tfoot>
            <tr id="totals-row"><td>TOTAL</td><td></td><td></td><td></td><td></td><td></td></tr>
          </tfoot>
        </table>
      </div>

      <h3>Per 100g</h3>
      <div class="macro-grid">
        <div class="form-row">
          <label for="per100-cal">Calories</label>
          <input type="number" id="per100-cal" class="short-input">
        </div>
        <div class="form-row">
          <label for="per100-fat">Fat (g)</label>
          <input type="number" id="per100-fat" step="0.5" class="short-input">
        </div>
        <div class="form-row">
          <label for="per100-protein">Protein (g)</label>
          <input type="number" id="per100-protein" step="0.5" class="short-input">
        </div>
        <div class="form-row">
          <label for="per100-carb">Carb (g)</label>
          <input type="number" id="per100-carb" step="0.5" class="short-input">
        </div>
      </div>

      <div id="calorie-warning" class="warning hidden"></div>
      <div id="similar-warning" class="warning hidden"></div>

      <div class="form-row">
        <label for="recipe-status">Status</label>
        <select id="recipe-status">
          <option value="new">New Recipe</option>
          <option value="iteration">Iteration of Existing</option>
          <option value="repeat">Repeat (Reprint)</option>
        </select>
      </div>
      <div id="iteration-of-row" class="form-row hidden">
        <label for="iteration-of">Iteration of</label>
        <input type="text" id="iteration-of" placeholder="Original recipe name">
        <input type="hidden" id="reuse-upc" value="">
      </div>

      <div class="copies-row">
        <div class="form-row">
          <label for="nutrition-copies">Nutrition labels</label>
          <input type="number" id="nutrition-copies" value="2" min="0" max="20" class="short-input">
        </div>
        <div class="form-row">
          <label for="recipe-copies">Recipe cards</label>
          <input type="number" id="recipe-copies" value="1" min="0" max="20" class="short-input">
        </div>
      </div>

      <div class="button-row">
        <button id="back-btn" class="secondary-btn">Back</button>
        <button id="generate-btn" class="primary-btn">Generate &amp; Print</button>
      </div>
      <div id="generate-error" class="error hidden"></div>
    </section>

    <!-- Step 3: Result -->
    <section id="result-section" class="card hidden">
      <h2>Labels Generated</h2>
      <div class="label-preview-row">
        <div class="label-preview">
          <h3>Nutrition</h3>
          <img id="nutrition-preview" alt="Nutrition label">
        </div>
        <div class="label-preview">
          <h3>Recipe Card</h3>
          <img id="recipe-preview" alt="Recipe card label">
        </div>
      </div>

      <div class="upc-display">
        <span class="upc-label">UPC:</span>
        <span id="upc-code" class="upc-code"></span>
      </div>

      <div id="print-status" class="success hidden"></div>

      <div class="button-row">
        <button id="reprint-btn" class="secondary-btn">Print Again</button>
        <button id="download-btn" class="secondary-btn">Download Labels</button>
        <button id="new-recipe-btn" class="primary-btn">New Recipe</button>
      </div>
    </section>

    <!-- Recipe History -->
    <details id="history-section" class="card">
      <summary><h2>Recipe History</h2></summary>
      <input type="text" id="history-search" placeholder="Search recipes...">
      <div id="history-list"></div>
    </details>
  </main>

  <script src="{{ base_path }}/static/app.js"></script>
</body>
</html>
